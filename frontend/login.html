<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joalheria - Acesso Restrito</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
      body { background-color: #fffcf6; }
      .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
  </head>
  <body>
    
    <div class="login-container">
      <div class="card p-5 border-0 shadow-sm rounded-0" style="width: 100%; max-width: 400px; background-color: #ffffff;">
        <h2 class="text-center mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Minha Joalheria</h2>
        <p class="text-center text-muted mb-4" style="font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">Identifique-se para continuar</p>
        
        <div id="mensagem-erro" class="alert alert-danger d-none rounded-0 text-center py-2" style="font-size: 0.9rem;"></div>

        <form id="form-login">
          <div class="mb-3">
            <label for="email" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">E-mail</label>
            <input type="email" class="form-control rounded-0 border-dark" id="email" placeholder="admin@joalheria.com" required>
          </div>
          <div class="mb-4">
            <label for="senha" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Senha</label>
              <input type="password" class="form-control rounded-0 border-dark" id="senha" placeholder="••••••••" required>
          </div>
  
          <button type="submit" class="btn btn-dark w-100 rounded-0 mb-3" id="btn-entrar" style="letter-spacing: 1px;">ENTRAR</button>
          <div class="text-center mb-2">
            <a href="cadastro.html" class="text-decoration-none text-muted" style="font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">
              Não tem conta? Cadastre-se
            </a>
          </div>
        </form>
        <div class="text-center mt-4">
        <a href="joias/index.html" class="text-decoration-none text-muted" style="font-size: 0.9rem; letter-spacing: 1px;">
            &#8592; VOLTAR PARA A VITRINE
        </a>
    </div>
      </div>
    </div>
    

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="login.js"></script>
  </body>
</html>
