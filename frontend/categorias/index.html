<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Joalheria - Categorias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
      <div class="container d-flex justify-content-between align-items-center">
        <a href="../joias/" class="btn btn-outline-dark btn-sm" style="border-radius: 0; letter-spacing: 1px;">VER VITRINE</a>
        <span class="navbar-brand mx-auto m-0">MINHA JOALHERIA</span>
        <div>
          <a href="criar/" class="btn btn-dark btn-sm" style="border-radius: 0; letter-spacing: 1px;">+ NOVA CATEGORIA</a>
        </div>
      </div>
    </nav>

    <div class="container" style="max-width: 800px">
      <div id="mensagem-erro" class="alert alert-danger d-none text-center rounded-0 border-0"></div>
      
      <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Gerenciar Categorias</h3>

      <div class="card p-0 border-0 shadow-sm rounded-0">
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th class="ps-4">ID</th>
                <th>Nome da Categoria</th>
                <th class="text-end pe-4">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-categorias">
              <tr><td colspan="3" class="text-center py-4 text-muted">Carregando categorias...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="categorias.js"></script>
  </body>
</html>
