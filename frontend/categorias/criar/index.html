<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Categoria</title>
    o 
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body class="bg-light">
    
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand">Nova Categoria</span>
        <a href="../" class="btn btn-light btn-sm">Voltar</a>
      </div>
    </nav>

    <div class="container" style="max-width: 500px">
      <div class="card shadow-sm">
        <div class="card-body">
          
          <form id="form-criar">
            <div class="mb-3">
              <label for="nome" class="form-label">Nome da Categoria</label>
              <input type="text" class="form-control" id="nome" placeholder="Ex: Anéis de Ouro" required>
            </div>
            
            <div id="mensagem-erro" class="alert alert-danger d-none"></div>
            
            <button type="submit" class="btn btn-success w-100">Salvar Categoria</button>
          </form>

        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="criar.js"></script>
  </body>
</html>
