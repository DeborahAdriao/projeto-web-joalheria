<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Categoria</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
      <div class="container d-flex justify-content-between align-items-center">
        <a href="../" class="btn btn-outline-dark btn-sm" style="border-radius: 0; letter-spacing: 1px;">VOLTAR</a>
        <span class="navbar-brand mx-auto m-0">MINHA JOALHERIA</span>
        <div style="width: 70px;"></div>
      </div>
    </nav>

    <div class="container" style="max-width: 500px">
      <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Nova Categoria</h3>
      
      <div class="card p-4">
        <form id="form-criar-categoria">
          <div class="mb-4">
            <label for="nome" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Nome da Categoria</label>
            <input type="text" class="form-control" id="nome" placeholder="Ex: Anéis, Pulseiras..." required>
          </div>

          <div id="mensagem-erro" class="alert alert-danger d-none rounded-0"></div>
          
          <button type="submit" class="btn btn-dark w-100" style="border-radius: 0; letter-spacing: 1px;">SALVAR CATEGORIA</button>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="criar.js"></script>
  </body>
</html>
