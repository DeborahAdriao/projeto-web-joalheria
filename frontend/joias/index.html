<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joalheria - Vitrine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    
    <nav class="navbar mb-0 py-3 bg-primary" style="border-bottom: 1px solid #e5e0d8;">
      <div class="container-fluid px-2 px-lg-4">
        <div class="row w-100 align-items-center m-0">
          
          <div class="col-12 col-lg-4 d-flex justify-content-center justify-content-lg-start order-2 order-lg-1 mt-3 mt-lg-0">
              <a href="../categorias/index.html" class="text-decoration-none text-dark" style="font-size: 0.85rem; letter-spacing: 1px; font-weight: 600;">CATEGORIAS</a>
          </div>
          
          <div class="col-12 col-lg-4 d-flex flex-column align-items-center justify-content-center order-1 order-lg-2">
              <span class="navbar-brand m-0 text-dark" style="font-size: 1.5rem; letter-spacing: 2px;">MINHA JOALHERIA</span>
              <span id="usuario-logado" class="text-dark d-none mt-1" style="font-size: 0.8rem; font-style: italic;"></span>
          </div>
          
          <div class="col-12 col-lg-4 d-flex justify-content-center justify-content-lg-end align-items-center gap-3 order-3 order-lg-3 mt-3 mt-lg-0">
            <button id="btn-sair" class="btn btn-sm btn-link text-dark text-decoration-none p-0" style="letter-spacing: 1px; font-weight: bold;">SAIR</button>
            <a href="criar/index.html" class="btn btn-outline-dark rounded-0 px-3 py-2" style="font-size: 0.8rem; letter-spacing: 1px;">CADASTRAR JOIA</a>
          </div>

        </div>
      </div>
    </nav>

    <div class="mb-5 position-relative">
      <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=1200&h=400&fit=crop" class="w-100 d-block" alt="Acervo de Joias" style="object-fit: cover; height: 350px;">
      <div class="position-absolute bottom-0 w-100 bg-dark bg-opacity-50 p-3 text-white text-center">
        <h2 style="font-family: 'Playfair Display', serif; margin: 0; letter-spacing: 1px;">Catálogo de Joias</h2>
        <p class="mb-0">Painel de gerenciamento do acervo.</p>
      </div>
    </div>

    <div class="container mb-5">
      
      <div id="mensagem-erro" class="alert alert-danger d-none text-center rounded-0 border-0"></div>
      
      <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif; font-style: italic;">Acabou de Chegar</h3>
      
      <div class="row justify-content-center mb-5">
        <div class="col-md-6">
          <div class="input-group shadow-sm">
            <input type="text" id="input-busca" class="form-control border-dark rounded-0" placeholder="Buscar joia pelo nome..." style="letter-spacing: 0.5px;">
            <button class="btn btn-dark rounded-0 px-4" type="button" id="btn-buscar" style="letter-spacing: 1px;">BUSCAR</button>
            <button class="btn btn-outline-dark rounded-0 px-3 d-none" type="button" id="btn-limpar-busca" title="Limpar busca">X</button>
          </div>
        </div>
      </div>

      <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="grid-joias">
        <div class="col">
          <div class="card h-100 text-center border-0 bg-transparent">
            <div class="card-body p-0">
               <p class="mt-4">Carregando vitrine...</p>
            </div>
          </div>
        </div>
      </div>

      <div id="paginacao-container" class="d-flex justify-content-center align-items-center mt-5 mb-3 gap-2 flex-wrap">
      </div>

    </div> 
    
    <div class="modal fade" id="modalExcluir" tabindex="-1" aria-labelledby="modalExcluirLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-0 border-0 shadow">
          
          <div class="modal-header bg-dark text-white rounded-0">
            <h5 class="modal-title" id="modalExcluirLabel" style="font-family: 'Playfair Display', serif;">Confirmar Ação</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          
          <div class="modal-body text-center py-4">
            <p class="mb-0 text-muted" id="mensagem-modal-excluir">Tem certeza que deseja excluir este item? Esta ação não poderá ser desfeita.</p>
          </div>
          
          <div class="modal-footer d-flex justify-content-center border-0 pb-4">
            <button type="button" class="btn btn-outline-dark px-4" style="border-radius: 0; letter-spacing: 1px;" data-bs-dismiss="modal">CANCELAR</button>
            <button type="button" class="btn btn-danger px-4" style="border-radius: 0; letter-spacing: 1px;" id="btn-confirmar-exclusao">EXCLUIR</button>
          </div>
          
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="meuToast" class="toast align-items-center text-white border-0 rounded-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem" style="letter-spacing: 1px; font-size: 0.85rem;">
                    </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="joias.js"></script>
  </body>
</html>
