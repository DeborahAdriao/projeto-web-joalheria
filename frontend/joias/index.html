<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joalheria - Catálogo de Joias</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body class="bg-light">
    
    <nav class="navbar navbar-dark bg-primary mb-4">
      <div class="container">
        <span class="navbar-brand">Catálogo de Joias</span>
        <div>
          <a href="../categorias/" class="btn btn-outline-light btn-sm me-2">Ver Categorias</a>
          <a href="criar/" class="btn btn-light btn-sm">+ Nova Joia</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div id="mensagem-erro" class="alert alert-danger d-none"></div>
      
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-hover align-middle">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Nome da Joia</th>
                <th>Preço (R$)</th>
                <th>Categoria</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-joias">
              <tr><td colspan="5" class="text-center">Carregando joias...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="joias.js"></script>
  </body>
</html>
