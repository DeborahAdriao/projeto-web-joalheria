<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Joia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body class="bg-light">
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-5">
      <div class="container d-flex justify-content-between align-items-center">
        <a href="../" class="btn btn-outline-dark btn-sm" style="border-radius: 0; letter-spacing: 1px;">VOLTAR</a>
        <span class="navbar-brand mx-auto m-0">MINHA JOALHERIA</span>
        <div class="d-flex align-items-center">
          <button id="btn-sair" class="btn btn-sm btn-link text-dark text-decoration-none" style="letter-spacing: 1px; font-weight: bold;">SAIR</button>
        </div>
      </div>
    </nav>

    <div class="container" style="max-width: 600px">
      <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Editar Joia</h3>
      
      <div class="card p-4 border-0 shadow-sm rounded-0">
        <form id="form-editar-joia">
          
          <div class="mb-4">
            <label for="nome" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Nome da Joia</label>
            <input type="text" class="form-control" id="nome" required>
          </div>

          <div class="row mb-4">
            <div class="col-md-6">
              <label for="preco" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Preço (R$)</label>
              <input type="number" step="0.01" class="form-control" id="preco" required>
            </div>
            
            <div class="col-md-6">
              <label for="categoria_id" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Categoria</label>
              <select class="form-select" id="categoria_id" required>
                <option value="">Carregando...</option>
              </select>
            </div>
          </div>

          <div id="mensagem-erro" class="alert alert-danger d-none rounded-0"></div>
          
          <button type="submit" class="btn btn-dark w-100" style="border-radius: 0; letter-spacing: 1px;">ATUALIZAR JOIA</button>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="editar.js"></script>
  </body>
</html>
