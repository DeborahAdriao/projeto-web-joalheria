<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Joia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../../style.css" />
  </head>
  <body>
    
    <nav class="navbar mb-5 py-3 bg-primary" style="border-bottom: 1px solid #e5e0d8;">
      <div class="container-fluid px-2 px-lg-4">
        <div class="row w-100 align-items-center m-0">
          
          <div class="col-12 col-lg-4 d-flex justify-content-center justify-content-lg-start order-2 order-lg-1 mt-3 mt-lg-0">
              <a href="../" class="text-decoration-none text-dark" style="font-size: 0.85rem; letter-spacing: 1px; font-weight: 600;">VOLTAR</a>
          </div>
          
          <div class="col-12 col-lg-4 d-flex flex-column align-items-center justify-content-center order-1 order-lg-2">
              <span class="navbar-brand m-0 text-dark" style="font-size: 1.5rem; letter-spacing: 2px;">MINHA JOALHERIA</span>
              <span id="usuario-logado" class="text-dark d-none mt-1" style="font-size: 0.8rem; font-style: italic;"></span>
          </div>
          
          <div class="col-12 col-lg-4 d-flex justify-content-center justify-content-lg-end align-items-center gap-3 order-3 order-lg-3 mt-3 mt-lg-0">
            <button id="btn-sair" class="btn btn-sm btn-link text-dark text-decoration-none p-0" style="letter-spacing: 1px; font-weight: bold;">SAIR</button>
          </div>

        </div>
      </div>
    </nav>

    <div class="container" style="max-width: 600px">
      <h3 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Editar Joia</h3>
      
      <div class="card p-4 border-0 shadow-sm rounded-0">
        <form id="form-editar-joia">
          
          <div class="mb-3">
            <label for="nome" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Nome da Joia</label>
            <input type="text" class="form-control" id="nome" placeholder="Ex: Aliança de Ouro 18k" required>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="preco" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Preço (R$)</label>
              <input type="number" step="0.01" class="form-control" id="preco" placeholder="0.00" required>
            </div>
            <div class="col-md-6">
              <label for="categoria_id" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Categoria</label>
              <select class="form-select" id="categoria_id" required>
                <option value="">Selecione...</option>
              </select>
            </div>
          </div>

          <div class="mb-3">
            <label for="imagem" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">URL da Imagem</label>
            <input type="url" class="form-control" id="imagem" placeholder="https://link-da-imagem.com/foto.jpg" required>
          </div>

          <div class="mb-4">
            <label for="descricao" class="form-label text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Descrição</label>
            <textarea class="form-control" id="descricao" rows="3" placeholder="Detalhes do material, tamanho, etc..." required></textarea>
          </div>

          <div id="mensagem-erro" class="alert alert-danger d-none rounded-0"></div>
          
          <button type="submit" class="btn btn-dark w-100" style="border-radius: 0; letter-spacing: 1px;">ATUALIZAR JOIA</button>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="editar.js"></script>
  </body>
</html>
