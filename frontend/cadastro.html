<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joalheria - Cadastro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <style>
      body { background-color: #fffcf6; } /* Cor Linho padronizada */
      .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
  </head>
  <body>
    
    <div class="login-container">
      <div class="card p-5 border-0 shadow-sm rounded-0" style="width: 100%; max-width: 450px; background-color: #ffffff;">
        <h2 class="text-center mb-1" style="font-family: 'Playfair Display', serif; letter-spacing: 1px;">Criar Conta</h2>
        <p class="text-center text-muted mb-4" style="font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase;">Junte-se à nossa Joalheria</p>
        
        <form id="form-cadastro">
          <div class="mb-3">
            <label for="nome" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Nome Completo</label>
            <input type="text" class="form-control rounded-0 border-dark" id="nome" placeholder="Seu nome" required>
          </div>
          
          <div class="mb-3">
            <label for="email" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">E-mail</label>
            <input type="email" class="form-control rounded-0 border-dark" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="row mb-4">
            <div class="col-6">
              <label for="senha" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Senha</label>
              <input type="password" class="form-control rounded-0 border-dark" id="senha" placeholder="••••••••" required minlength="6">
            </div>
            <div class="col-6">
              <label for="confirmar-senha" class="form-label text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Confirmar</label>
              <input type="password" class="form-control rounded-0 border-dark" id="confirmar-senha" placeholder="••••••••" required>
            </div>
          </div>

          <button type="submit" class="btn btn-dark w-100 rounded-0 mb-3" style="letter-spacing: 1px;">CADASTRAR</button>
          
          <div class="text-center">
            <a href="login.html" class="text-decoration-none text-muted" style="font-size: 0.85rem; letter-spacing: 1px;">
              JÁ TEM UMA CONTA? FAÇA LOGIN
            </a>
          </div>
        </form>
        
        <div class="text-center mt-4 pt-3" style="border-top: 1px solid #e5e0d8;">
            <a href="joias/index.html" class="text-decoration-none text-muted" style="font-size: 0.85rem; letter-spacing: 1px;">
                &#8592; VOLTAR PARA A VITRINE
            </a>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;">
        <div id="meuToast" class="toast align-items-center text-white border-0 rounded-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem" style="letter-spacing: 1px; font-size: 0.85rem;"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="cadastro.js"></script>
  </body>
</html>
